<!DOCTYPE html>
<html>
<head>
    <title>Kampanya API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🎉 Kampanya API Test</h1>
    
    <button onclick="testKampanyalar()">Test: Kampanyaları Getir</button>
    <button onclick="testAdminKampanyalar()">Test: Admin Kampanyaları</button>
    
    <div id="results"></div>

    <script>
        const API_URL = 'http://localhost:5000';

        async function testKampanyalar() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Test ediliyor...</p>';
            
            try {
                const response = await fetch(`${API_URL}/api/kampanyalar`);
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="test success">
                        <h3>✅ Kampanyalar Başarıyla Getirildi</h3>
                        <p><strong>Toplam Kampanya:</strong> ${data.length}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="test error">
                        <h3>❌ Hata</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testAdminKampanyalar() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Test ediliyor...</p>';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/kampanyalar`);
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="test success">
                        <h3>✅ Admin Kampanyalar Başarıyla Getirildi</h3>
                        <p><strong>Toplam Kampanya:</strong> ${data.length}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="test error">
                        <h3>❌ Hata</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Otomatik test
        window.onload = () => {
            testKampanyalar();
        };
    </script>
</body>
</html>
