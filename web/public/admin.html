<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 400px; width: 100%; }
        .login-box h1 { color: #667eea; margin-bottom: 30px; text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .login-box input:focus { outline: none; border-color: #667eea; }
        .login-box button { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #5568d3; }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .info { margin-top: 20px; padding: 15px; background: #d1ecf1; border-radius: 8px; font-size: 13px; }
        
        .admin-page { display: none; }
        .admin-page.active { display: block; }
        
        header { background: white; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-value { font-size: 36px; font-weight: bold; color: #667eea; margin: 10px 0; }
        .stat-label { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h1>🔒 Admin Girişi</h1>
            <div id="error" class="error"></div>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Kullanıcı Adı" required>
                <input type="password" id="password" placeholder="Şifre" required>
                <button type="submit">Giriş Yap</button>
            </form>
            <div class="info">
                <strong>Giriş Bilgileri:</strong><br>
                Kullanıcı: admin<br>
                Şifre: admin123
            </div>
        </div>
    </div>

    <!-- Admin Page -->
    <div id="adminPage" class="admin-page">
        <header>
            <div class="header-content">
                <h1>⚙️ Admin Paneli</h1>
                <button onclick="logout()" class="logout-btn">🚪 Çıkış Yap</button>
            </div>
        </header>

        <div class="container">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Toplam Ürün</div>
                    <div class="stat-value" id="statProducts">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Toplam Sipariş</div>
                    <div class="stat-value" id="statOrders">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Toplam Kullanıcı</div>
                    <div class="stat-value" id="statUsers">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Toplam Gelir</div>
                    <div class="stat-value" id="statRevenue">- ₺</div>
                </div>
            </div>

            <div class="card">
                <h2>Hoş Geldiniz!</h2>
                <p>Admin paneline başarıyla giriş yaptınız.</p>
                <p style="margin-top: 15px;">Tam özellikli admin paneli için: <a href="/admin-tam.html">Admin Tam Panel</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://kiyafet-magazasi-backend.vercel.app';

        // Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'admin123') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdminPage();
                loadStats();
            } else {
                showError('❌ Kullanıcı adı veya şifre hatalı!');
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }

        function showAdminPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPage').classList.add('active');
        }

        function showLoginPage() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').classList.remove('active');
        }

        function logout() {
            if (confirm('Çıkış yapmak istediğinizden emin misiniz?')) {
                sessionStorage.removeItem('adminLoggedIn');
                showLoginPage();
            }
        }

        async function loadStats() {
            try {
                // Ürünler
                const productsRes = await fetch(`${API_URL}/api/urunler`);
                const products = await productsRes.json();
                document.getElementById('statProducts').textContent = products.length;

                // Siparişler
                const ordersRes = await fetch(`${API_URL}/api/admin/siparisler`);
                const orders = await ordersRes.json();
                document.getElementById('statOrders').textContent = orders.length;

                // Kullanıcılar
                const usersRes = await fetch(`${API_URL}/api/admin/kullanicilar`);
                const users = await usersRes.json();
                document.getElementById('statUsers').textContent = users.length;

                // Gelir
                const totalRevenue = orders.reduce((sum, o) => sum + parseFloat(o.toplamTutar || 0), 0);
                document.getElementById('statRevenue').textContent = totalRevenue.toFixed(2) + ' ₺';
            } catch (error) {
                console.error('İstatistik yükleme hatası:', error);
            }
        }

        // Check auth on load
        window.onload = () => {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (isLoggedIn === 'true') {
                showAdminPage();
                loadStats();
            } else {
                showLoginPage();
            }
        };
    </script>
</body>
</html>
