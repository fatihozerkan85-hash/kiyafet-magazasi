<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/as.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
    <style id="mobile-footer-fix">
      @media screen and (max-width: 768px) {
        html { height: auto !important; }
        body { height: auto !important; margin: 0 !important; }
        #root { height: auto !important; }
        
        .App,
        div.App,
        #root > .App,
        #root > div.App,
        div[class="App"],
        #root > div[class="App"] {
          display: block !important;
          min-height: 100vh !important;
          position: relative !important;
        }

        /* Tum child'lar flex-shrink: 0 - kuculmeyecek */
        .App > *,
        div.App > * {
          flex-shrink: 0 !important;
        }
        
        /* Footer - margin-top auto ile en alta */
        .App > footer,
        div.App > footer,
        #root > .App > footer,
        #root > div > footer {
          margin-top: auto !important;
          flex-shrink: 0 !important;
          position: relative !important;
          z-index: 1 !important;
          width: 100% !important;
        }
      }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    <div id="root"></div>
    <script>
      if(window.innerWidth <= 768) {
        setTimeout(function() {
          var app = document.querySelector('.App');
          if(!app) return;
          var mainDiv = app.children[2];
          if(!mainDiv) return;
          var mcs = window.getComputedStyle(mainDiv);
          var info = 'V9 | MainDiv: display=' + mcs.display + 
            ' height=' + mcs.height + 
            ' maxHeight=' + mcs.maxHeight + 
            ' minHeight=' + mcs.minHeight +
            ' overflow=' + mcs.overflow +
            ' overflowY=' + mcs.overflowY +
            ' position=' + mcs.position +
            ' boxSizing=' + mcs.boxSizing +
            ' padding=' + mcs.padding +
            ' h=' + Math.round(mainDiv.getBoundingClientRect().height) +
            ' sH=' + mainDiv.scrollHeight +
            ' oH=' + mainDiv.offsetHeight +
            ' cH=' + mainDiv.clientHeight;
          // Ilk child'in bilgisi
          var fc = mainDiv.children[0];
          if(fc) {
            info += ' | FirstChild: tag=' + fc.tagName + ' h=' + Math.round(fc.getBoundingClientRect().height) + ' sH=' + fc.scrollHeight;
          }
          var d = document.createElement('div');
          d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:blue;color:white;padding:8px;font-size:10px;z-index:99999;word-break:break-all;max-height:120px;overflow-y:auto;';
          d.textContent = info;
          document.body.appendChild(d);
        }, 4000);
      }
    </script>
  </body>
</html>
