<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/as.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    <div id="root"></div>
    <script>
    (function(){
      if(window.innerWidth > 768) return;
      var fixing = false;

      function applyFix(app) {
        if(fixing) return;
        fixing = true;
        app.style.cssText = app.style.cssText + 
          '; display: flex !important; flex-direction: column !important; min-height: 100vh !important;';
        var footer = app.querySelector('footer');
        if(footer) {
          footer.style.cssText = footer.style.cssText + 
            '; margin-top: auto !important; flex-shrink: 0 !important;';
        }
        setTimeout(function(){ fixing = false; }, 50);
      }

      function init() {
        var app = document.querySelector('.App');
        if(!app) { setTimeout(init, 100); return; }
        
        applyFix(app);

        // React re-render'larını yakala
        new MutationObserver(function() {
          var a = document.querySelector('.App');
          if(a) applyFix(a);
        }).observe(document.getElementById('root'), { 
          childList: true, subtree: true, attributes: true, attributeFilter: ['style']
        });
      }

      if(document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
    </script>
  </body>
</html>
