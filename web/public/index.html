<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/as.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
    <style id="mobile-footer-fix">
      /* MOBIL FOOTER FIX - en agresif yontem */
      @media screen and (max-width: 768px) {
        html { height: auto !important; }
        body { height: auto !important; min-height: 100vh !important; margin: 0 !important; }
        #root { height: auto !important; min-height: 100vh !important; }
        
        /* .App - tum olasiliklari kapat */
        .App,
        div.App,
        #root > .App,
        #root > div.App,
        div[class="App"],
        #root > div[class="App"] {
          min-height: 100vh !important;
          height: auto !important;
          display: flex !important;
          flex-direction: column !important;
          position: relative !important;
        }
        
        /* Footer - margin-top auto ile en alta */
        .App > footer,
        div.App > footer,
        #root > .App > footer,
        #root > div > footer {
          margin-top: auto !important;
          flex-shrink: 0 !important;
          position: relative !important;
          z-index: 1 !important;
          width: 100% !important;
        }
      }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    <div id="root"></div>
    <script>
      if(window.innerWidth <= 768) {
        setTimeout(function() {
          var app = document.querySelector('.App');
          if(!app) return;
          var cs = window.getComputedStyle(app);
          var footer = app.querySelector('footer');
          var fcs = footer ? window.getComputedStyle(footer) : null;
          var info = 'V5 DEBUG | ' +
            'App.display=' + cs.display + 
            ' | App.flexDir=' + cs.flexDirection + 
            ' | App.minH=' + cs.minHeight +
            ' | App.height=' + cs.height +
            ' | Footer.mTop=' + (fcs ? fcs.marginTop : 'N/A') +
            ' | Children=' + app.children.length;
          var d = document.createElement('div');
          d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:8px;font-size:11px;z-index:99999;word-break:break-all;';
          d.textContent = info;
          document.body.appendChild(d);
        }, 3000);
      }
    </script>
  </body>
</html>
