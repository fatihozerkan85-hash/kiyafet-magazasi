  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
    <style>
      @media (max-width: 768px) {
        html, body { height: 100% !important; margin: 0 !important; }
        #root { min-height: 100% !important; }
        .App {
          display: flex !important;
          flex-direction: column !important;
          min-height: 100vh !important;
          min-height: -webkit-fill-available !important;
        }
        .App > header { flex-shrink: 0 !important; }
        .App > header + div { flex-shrink: 0 !important; }
        .App > header + div + div {
          flex-grow: 1 !important;
          flex-shrink: 1 !important;
          flex-basis: auto !important;
        }
        .App > footer {
          flex-shrink: 0 !important;
          width: 100% !important;
        }
      }
    </style>
  </head>
