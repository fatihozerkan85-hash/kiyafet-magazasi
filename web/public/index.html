<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/as.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
    <style>
      @media (max-width: 768px) {
        #root, #root > .App {
          display: flex !important;
          flex-direction: column !important;
          min-height: 100vh !important;
        }
        /* Header ve kategori menüsü sabit */
        #root > .App > header,
        #root > .App > header + div {
          flex-shrink: 0 !important;
        }
        /* Ana içerik - kalan alanı doldur */
        #root > .App > header + div + div {
          flex: 1 1 auto !important;
          margin-top: 0 !important;
          margin-bottom: 0 !important;
        }
        /* Footer - kesinlikle en altta */
        #root > .App > footer {
          flex-shrink: 0 !important;
          margin-top: auto !important;
          order: 999 !important;
        }
        /* Ürün grid - mobilde tek kolon */
        #root > .App > header + div + div div[style*="grid-template-columns"] {
          grid-template-columns: 1fr !important;
        }
        /* Ürün resimleri - mobilde küçült */
        #root > .App > header + div + div img {
          max-height: 300px !important;
        }
      }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    <div id="root"></div>
  </body>
</html>
