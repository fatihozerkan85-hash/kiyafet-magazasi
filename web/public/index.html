<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/as.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
    <style>
      @media (max-width: 768px) {
        html, body { margin: 0 !important; padding: 0 !important; }
        #root { min-height: 100vh !important; }
        .App {
          display: flex !important;
          flex-direction: column !important;
          min-height: 100vh !important;
        }
        .App > header { flex: 0 0 auto !important; }
        .App > header + div { flex: 0 0 auto !important; }
        .App > header + div + div { flex: 1 0 auto !important; }
        .App > div[style*="position: fixed"] { flex: 0 0 0px !important; }
        .App > footer { flex: 0 0 auto !important; position: relative !important; }
      }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    <div id="root"></div>
  </body>
</html>
