<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/as.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
    <style>
      @media screen and (max-width: 768px) {
        .App { position: relative !important; }
      }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    <div id="root"></div>
    <script>
    (function(){
      if(window.innerWidth > 768) return;

      function fix() {
        var app = document.querySelector('.App');
        if(!app) return;

        // Tum child'larin SCROLL yuksekligini topla
        var total = 0;
        for(var i = 0; i < app.children.length; i++) {
          var c = app.children[i];
          // fixed pozisyonlu elementleri (cerez banner) atla
          if(c.style.position === 'fixed') continue;
          var sh = c.scrollHeight || 0;
          // margin'leri de ekle
          var cs = window.getComputedStyle(c);
          var mt = parseInt(cs.marginTop) || 0;
          var mb = parseInt(cs.marginBottom) || 0;
          total += sh + mt + mb;
        }

        // .App'in min-height'ini toplam scroll yuksekligine ayarla
        var viewH = window.innerHeight;
        var needed = Math.max(total, viewH);
        app.style.setProperty('min-height', needed + 'px', 'important');
      }

      function init() {
        var app = document.querySelector('.App');
        if(!app) { setTimeout(init, 200); return; }

        fix();

        // DOM degisikliklerinde tekrar hesapla
        new MutationObserver(function(){ setTimeout(fix, 100); })
          .observe(app, { childList: true, subtree: true });

        // Resim yuklendiginde tekrar hesapla
        app.addEventListener('load', function(){ setTimeout(fix, 100); }, true);

        // Ilk 20 saniye periyodik kontrol
        var n = 0;
        var iv = setInterval(function(){ fix(); if(++n >= 40) clearInterval(iv); }, 500);

        window.addEventListener('resize', fix);
      }

      if(document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else { init(); }
    })();
    </script>
  </body>
</html>
