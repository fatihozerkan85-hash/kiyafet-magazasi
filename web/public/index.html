<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/as.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#C85A8E" />
    <meta name="description" content="ASL BUTIQUE - Online Alışveriş" />
    <title>ASL BUTIQUE</title>
  </head>
  <body>
    <noscript>Bu uygulamayı çalıştırmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    <div id="root"></div>
    <script>
    (function(){
      if(window.innerWidth > 768) return;

      function fix() {
        var app = document.querySelector('.App');
        if(!app) return;
        var footer = null;
        var contentScrollH = 0;

        for(var i = 0; i < app.children.length; i++) {
          var c = app.children[i];
          if(c.tagName === 'FOOTER') {
            footer = c;
          } else if(c.style.position !== 'fixed') {
            var cs = window.getComputedStyle(c);
            contentScrollH += c.scrollHeight + (parseInt(cs.marginTop)||0) + (parseInt(cs.marginBottom)||0);
          }
        }

        if(!footer) return;

        var footerH = footer.scrollHeight;
        var totalH = contentScrollH + footerH;
        var viewH = window.innerHeight;
        var finalH = Math.max(totalH, viewH);

        // App'i position relative yap ve yuksekligi ayarla
        app.style.setProperty('position', 'relative', 'important');
        app.style.setProperty('min-height', finalH + 'px', 'important');
        app.style.setProperty('padding-bottom', footerH + 'px', 'important');

        // Footer'i absolute bottom 0 yap
        footer.style.setProperty('position', 'absolute', 'important');
        footer.style.setProperty('bottom', '0', 'important');
        footer.style.setProperty('left', '0', 'important');
        footer.style.setProperty('right', '0', 'important');
        footer.style.setProperty('width', '100%', 'important');
      }

      function init() {
        var app = document.querySelector('.App');
        if(!app) { setTimeout(init, 200); return; }
        fix();
        new MutationObserver(function(){ setTimeout(fix, 100); })
          .observe(app, { childList: true, subtree: true });
        app.addEventListener('load', function(){ setTimeout(fix, 100); }, true);
        var n = 0;
        var iv = setInterval(function(){ fix(); if(++n >= 40) clearInterval(iv); }, 500);
        window.addEventListener('resize', fix);
      }

      if(document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else { init(); }
    })();
    </script>
  </body>
</html>
